<script>
    // 游戏逻辑 - 修复版本
    (function() {
        'use strict';
        
        var sel_id = "";
        var selectedItems = new Set(); // 使用Set来管理选中状态
        var listItems = null;
        var shareLink = null;
        
        // 初始化函数
        function init() {
            listItems = document.querySelectorAll(".J_sel");
            shareLink = document.getElementById("J_share_link");
            
            if (!listItems.length || !shareLink) {
                console.error('Required elements not found');
                return;
            }
            
            // 绑定事件
            bindEvents();
            
            // 从localStorage恢复状态
            restoreState();
        }
        
        // 绑定事件
        function bindEvents() {
            // 为每个列表项绑定点击事件
            Array.prototype.forEach.call(listItems, function(item, index) {
                item.addEventListener('click', handleItemClick, false);
                item.addEventListener('touchstart', function(e) {
                    // 防止在移动设备上的双击缩放
                    e.preventDefault();
                    handleItemClick.call(this, e);
                }, false);
            });
            
            // 绑定完成按钮事件
            shareLink.addEventListener('click', handleShareClick, false);
        }
        
        // 处理列表项点击
        function handleItemClick(e) {
            e.preventDefault();
            e.stopPropagation();
            
            var itemId = this.getAttribute("data-id");
            var isSelected = selectedItems.has(itemId);
            
            if (isSelected) {
                // 取消选择
                selectedItems.delete(itemId);
                this.setAttribute("data-sel", "0");
                this.classList.remove("list-item-sel");
            } else {
                // 选择
                selectedItems.add(itemId);
                this.setAttribute("data-sel", "1");
                this.classList.add("list-item-sel");
            }
            
            // 更新sel_id字符串
            updateSelId();
            
            // 保存状态到localStorage
            saveState();
            
            // 更新按钮状态
            updateShareButton();
        }
        
        // 更新sel_id字符串
        function updateSelId() {
            sel_id = Array.from(selectedItems).join(',');
            if (sel_id) {
                sel_id += ',';
            }
        }
        
        // 处理分享按钮点击
        function handleShareClick(e) {
            e.preventDefault();
            
            if (selectedItems.size === 0) {
                showToast("至少要选一个拉过粑粑的地方哦！");
                return false;
            }
            
            // 收集选中的省份信息
            var selectedIds = Array.from(selectedItems);
            var selectedProvinces = [];
            
            selectedIds.forEach(function(id) {
                var item = document.querySelector('.J_sel[data-id="' + id + '"]');
                if (item) {
                    var span = item.querySelector('span');
                    if (span) {
                        selectedProvinces.push(span.textContent.trim());
                    }
                }
            });
            
            // 保存到localStorage
            localStorage.setItem('baba_provinces_ids', selectedIds.join(','));
            localStorage.setItem('baba_provinces_names', selectedProvinces.join(','));
            
            // 跳转到结果页面
            var url = "result.html?selected=" + selectedIds.join(',') + 
                     "&names=" + encodeURIComponent(selectedProvinces.join(','));
            window.location.href = url;
        }
        
        // 更新分享按钮
        function updateShareButton() {
            var selectedIds = Array.from(selectedItems);
            shareLink.setAttribute("href", "#" + selectedIds.join(','));
        }
        
        // 保存状态到localStorage
        function saveState() {
            var selectedIds = Array.from(selectedItems);
            if (selectedIds.length > 0) {
                localStorage.setItem('baba_temp_selection', selectedIds.join(','));
            } else {
                localStorage.removeItem('baba_temp_selection');
            }
        }
        
        // 从localStorage恢复状态
        function restoreState() {
            var tempSelection = localStorage.getItem('baba_temp_selection');
            if (tempSelection) {
                var ids = tempSelection.split(',');
                ids.forEach(function(id) {
                    if (id.trim()) {
                        selectedItems.add(id.trim());
                        var item = document.querySelector('.J_sel[data-id="' + id.trim() + '"]');
                        if (item) {
                            item.setAttribute("data-sel", "1");
                            item.classList.add("list-item-sel");
                        }
                    }
                });
                updateSelId();
                updateShareButton();
            }
        }
        
        // 显示提示信息
        function showToast(message) {
            // 移除已存在的toast
            var existingToast = document.querySelector('.toast-message');
            if (existingToast && existingToast.parentNode) {
                existingToast.parentNode.removeChild(existingToast);
            }
            
            // 创建新的toast
            var toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.textContent = message;
            
            // 设置样式
            Object.assign(toast.style, {
                position: 'fixed',
                bottom: '100px',
                left: '50%',
                transform: 'translateX(-50%)',
                backgroundColor: 'rgba(0, 0, 0, 0.8)',
                color: '#fff',
                padding: '12px 24px',
                borderRadius: '25px',
                fontSize: '16px',
                zIndex: '9999',
                boxShadow: '0 2px 10px rgba(0,0,0,0.3)',
                maxWidth: '80%',
                textAlign: 'center',
                wordWrap: 'break-word'
            });
            
            // 添加到页面
            document.body.appendChild(toast);
            
            // 自动移除
            setTimeout(function() {
                if (toast && toast.parentNode) {
                    toast.style.opacity = '0';
                    toast.style.transition = 'opacity 0.3s ease';
                    setTimeout(function() {
                        if (toast && toast.parentNode) {
                            toast.parentNode.removeChild(toast);
                        }
                    }, 300);
                }
            }, 2000);
        }
        
        // 页面加载完成后初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
        
        // 页面卸载时清理临时状态
        window.addEventListener('beforeunload', function() {
            // 可以在这里做一些清理工作
        });
        
    })();
</script>

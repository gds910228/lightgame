<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Button background -->
  <rect x="0" y="0" width="200" height="80" rx="40" ry="40" fill="#4CAF50" stroke="#45a049" stroke-width="2" />
  
  <!-- Share icon -->
  <g transform="translate(100, 40)">
    <!-- Share symbol -->
    <circle cx="-20" cy="-10" r="8" fill="white" />
    <circle cx="20" cy="-10" r="8" fill="white" />
    <circle cx="0" cy="15" r="8" fill="white" />
    
    <!-- Connection lines -->
    <line x1="-12" y1="-6" x2="12" y2="-6" stroke="white" stroke-width="3" />
    <line x1="-12" y1="-14" x2="8" y2="11" stroke="white" stroke-width="3" />
    <line x1="12" y1="-14" x2="-8" y2="11" stroke="white" stroke-width="3" />
  </g>
  
  <!-- Text -->
  <text x="100" y="55" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">Share</text>
</svg>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }

        .game-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .game-title {
            color: white;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .score-display {
            color: white;
            font-size: 1.5em;
            margin-bottom: 20px;
        }

        #gameCanvas {
            border: 3px solid white;
            border-radius: 10px;
            background-color: #1a1a2e;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .controls {
            margin-top: 20px;
            color: white;
            font-size: 0.9em;
        }

        .start-instruction {
            color: #ffd700;
            font-size: 1.1em;
            margin-top: 15px;
            font-weight: bold;
        }
        
        .debug-info {
            position: fixed;
            top: 5px;
            left: 5px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            padding: 5px;
            font-size: 12px;
            border-radius: 5px;
            z-index: 1001;
            max-width: 300px;
            max-height: 100px;
            overflow: auto;
        }
    </style>
</head>
<body>
    <div class="debug-info" id="debugInfo">Debug info will appear here</div>
    
    <div class="game-container">
        <h1 class="game-title">🐍 Snake Game Test</h1>
        <div class="score-display">Score: <span id="scoreValue">0</span></div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <p>Use arrow keys to control the snake</p>
            <div class="start-instruction" id="startInstruction">Press any arrow key to start!</div>
        </div>
    </div>

    <script>
        // Debug function
        function debug(message) {
            const debugElement = document.getElementById('debugInfo');
            debugElement.innerHTML += message + '<br>';
            console.log(message);
        }
        
        debug('Game initializing...');
        
        // Game variables
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreValue');
        const startInstruction = document.getElementById('startInstruction');
        
        debug('DOM elements loaded');

        // Game settings
        const GRID_SIZE = 20;
        const CANVAS_SIZE = 400;
        const GRID_COUNT = CANVAS_SIZE / GRID_SIZE;

        // Game state
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let direction = {x: 0, y: 0};
        let score = 0;
        let gameRunning = false;
        let gameStarted = false;
        let gameLoop = null;

        // Initialize game
        function init() {
            debug('Initializing game canvas...');
            // Clear canvas
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            
            // Draw initial snake and food
            drawSnake();
            drawFood();
        }

        // Generate random food position
        function generateFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * GRID_COUNT),
                    y: Math.floor(Math.random() * GRID_COUNT)
                };
            } while (isSnakePosition(food.x, food.y));
        }

        // Check if position is occupied by snake
        function isSnakePosition(x, y) {
            return snake.some(segment => segment.x === x && segment.y === y);
        }

        // Draw snake
        function drawSnake() {
            snake.forEach((segment, index) => {
                ctx.fillStyle = index === 0 ? '#45b7aa' : '#4ecdc4';
                ctx.fillRect(
                    segment.x * GRID_SIZE + 1,
                    segment.y * GRID_SIZE + 1,
                    GRID_SIZE - 2,
                    GRID_SIZE - 2
                );
            });
        }

        // Draw food
        function drawFood() {
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(
                food.x * GRID_SIZE + GRID_SIZE / 2,
                food.y * GRID_SIZE + GRID_SIZE / 2,
                GRID_SIZE / 2 - 1,
                0,
                2 * Math.PI
            );
            ctx.fill();
        }

        // Update game state
        function update() {
            if (!gameRunning || !gameStarted) return;

            // Calculate new head position
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            // Check wall collision
            if (head.x < 0 || head.x >= GRID_COUNT || head.y < 0 || head.y >= GRID_COUNT) {
                endGame();
                return;
            }

            // Check self collision
            if (isSnakePosition(head.x, head.y)) {
                endGame();
                return;
            }

            // Add new head
            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                generateFood();
            } else {
                snake.pop();
            }
        }

        // Draw everything
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            // Draw snake and food
            drawSnake();
            drawFood();
        }

        // Main game loop
        function gameStep() {
            update();
            draw();
        }

        // Start game
        function startGame() {
            if (gameStarted) return;
            
            debug('Starting game...');
            gameStarted = true;
            gameRunning = true;
            startInstruction.style.display = 'none';
            
            // Start game loop
            gameLoop = setInterval(gameStep, 150);
        }

        // End game
        function endGame() {
            debug('Game over!');
            gameRunning = false;
            gameStarted = false;
            
            if (gameLoop) {
                clearInterval(gameLoop);
                gameLoop = null;
            }
            
            alert('Game Over! Your score: ' + score);
            resetGame();
        }

        // Reset game
        function resetGame() {
            debug('Resetting game...');
            // Reset game state
            snake = [{x: 10, y: 10}];
            direction = {x: 0, y: 0};
            score = 0;
            gameRunning = false;
            gameStarted = false;
            
            // Clear game loop
            if (gameLoop) {
                clearInterval(gameLoop);
                gameLoop = null;
            }
            
            // Update UI
            scoreElement.textContent = score;
            startInstruction.style.display = 'block';
            
            // Generate new food and redraw
            generateFood();
            draw();
        }

        // Handle keyboard input
        function handleKeyPress(event) {
            const key = event.key;
            debug('Key pressed: ' + key);
            
            // Start game on first arrow key press
            if (!gameStarted && (key.startsWith('Arrow') || ['w', 'a', 's', 'd'].includes(key.toLowerCase()))) {
                startGame();
            }
            
            if (!gameRunning) return;
            
            // Prevent reverse direction
            switch(key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) {
                        direction = {x: 0, y: -1};
                    }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) {
                        direction = {x: 0, y: 1};
                    }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) {
                        direction = {x: -1, y: 0};
                    }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) {
                        direction = {x: 1, y: 0};
                    }
                    break;
            }
            
            event.preventDefault();
        }

        // Event listeners
        document.addEventListener('keydown', handleKeyPress);

        // Initialize game when page loads
        window.addEventListener('load', () => {
            debug('Window load event fired');
            generateFood();
            init();
        });

        // Also initialize immediately in case load event already fired
        if (document.readyState === 'complete') {
            debug('Document already complete, initializing now');
            generateFood();
            init();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game Debug</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .debug-info {
            background: #fff;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .game-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #333;
        }
        #gameCanvas {
            border: 3px solid #333;
            background-color: #2c3e50;
        }
        .score {
            font-size: 24px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="debug-info">
        <h3>Debug Information</h3>
        <div id="debugLog">Initializing...</div>
    </div>

    <div class="game-container">
        <h1>🐍 Snake Game Debug</h1>
        <div class="score">Score: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div>Use arrow keys to control</div>
    </div>

    <script>
        // Debug logging function
        function debugLog(message) {
            console.log('[Snake Debug]', message);
            const debugElement = document.getElementById('debugLog');
            if (debugElement) {
                debugElement.innerHTML += '<br>' + new Date().toLocaleTimeString() + ': ' + message;
            }
        }

        // Game state with debug info
        let gameState = {
            canvas: null,
            ctx: null,
            scoreElement: null,
            gridSize: 20,
            tileCount: 0,
            snake: [{x: 10, y: 10}],
            food: {x: 15, y: 15},
            dx: 0,
            dy: 0,
            score: 0,
            gameRunning: false
        };

        // Initialize with extensive debugging
        function initGame() {
            debugLog('Starting game initialization...');
            
            try {
                // Get canvas element
                gameState.canvas = document.getElementById('gameCanvas');
                debugLog('Canvas element: ' + (gameState.canvas ? 'Found' : 'NOT FOUND'));
                
                if (!gameState.canvas) {
                    debugLog('ERROR: Canvas element not found!');
                    return false;
                }

                // Get canvas context
                gameState.ctx = gameState.canvas.getContext('2d');
                debugLog('Canvas context: ' + (gameState.ctx ? 'Found' : 'NOT FOUND'));
                
                if (!gameState.ctx) {
                    debugLog('ERROR: Canvas context not available!');
                    return false;
                }

                // Get score element
                gameState.scoreElement = document.getElementById('score');
                debugLog('Score element: ' + (gameState.scoreElement ? 'Found' : 'NOT FOUND'));

                // Calculate tile count
                gameState.tileCount = gameState.canvas.width / gameState.gridSize;
                debugLog('Canvas dimensions: ' + gameState.canvas.width + 'x' + gameState.canvas.height);
                debugLog('Tile count: ' + gameState.tileCount);

                // Test canvas drawing
                gameState.ctx.fillStyle = '#ff0000';
                gameState.ctx.fillRect(0, 0, 50, 50);
                debugLog('Test rectangle drawn');

                // Set initial game state
                gameState.dx = 1;
                gameState.dy = 0;
                gameState.gameRunning = true;

                debugLog('Game initialization completed successfully');
                
                // Generate food and start game
                generateFood();
                draw();
                gameLoop();
                
                return true;
                
            } catch (error) {
                debugLog('ERROR during initialization: ' + error.message);
                console.error('Game initialization error:', error);
                return false;
            }
        }

        function generateFood() {
            try {
                gameState.food = {
                    x: Math.floor(Math.random() * gameState.tileCount),
                    y: Math.floor(Math.random() * gameState.tileCount)
                };
                debugLog('Food generated at: ' + gameState.food.x + ',' + gameState.food.y);
            } catch (error) {
                debugLog('ERROR generating food: ' + error.message);
            }
        }

        function draw() {
            try {
                if (!gameState.ctx || !gameState.canvas) {
                    debugLog('ERROR: Canvas or context not available for drawing');
                    return;
                }
                
                // Clear canvas
                gameState.ctx.fillStyle = '#2c3e50';
                gameState.ctx.fillRect(0, 0, gameState.canvas.width, gameState.canvas.height);

                // Draw snake
                gameState.ctx.fillStyle = '#27ae60';
                for (let segment of gameState.snake) {
                    gameState.ctx.fillRect(
                        segment.x * gameState.gridSize, 
                        segment.y * gameState.gridSize, 
                        gameState.gridSize - 2, 
                        gameState.gridSize - 2
                    );
                }

                // Draw food
                gameState.ctx.fillStyle = '#e74c3c';
                gameState.ctx.beginPath();
                gameState.ctx.arc(
                    gameState.food.x * gameState.gridSize + gameState.gridSize / 2,
                    gameState.food.y * gameState.gridSize + gameState.gridSize / 2,
                    gameState.gridSize / 2 - 1,
                    0,
                    2 * Math.PI
                );
                gameState.ctx.fill();
                
            } catch (error) {
                debugLog('ERROR during drawing: ' + error.message);
            }
        }

        function update() {
            if (!gameState.gameRunning) return;

            try {
                const head = {
                    x: gameState.snake[0].x + gameState.dx, 
                    y: gameState.snake[0].y + gameState.dy
                };

                // Check collisions
                if (head.x < 0 || head.x >= gameState.tileCount || 
                    head.y < 0 || head.y >= gameState.tileCount) {
                    debugLog('Wall collision detected');
                    gameState.gameRunning = false;
                    return;
                }

                for (let segment of gameState.snake) {
                    if (head.x === segment.x && head.y === segment.y) {
                        debugLog('Self collision detected');
                        gameState.gameRunning = false;
                        return;
                    }
                }

                gameState.snake.unshift(head);

                // Check food collision
                if (head.x === gameState.food.x && head.y === gameState.food.y) {
                    gameState.score += 10;
                    if (gameState.scoreElement) {
                        gameState.scoreElement.textContent = gameState.score;
                    }
                    generateFood();
                    debugLog('Food eaten! Score: ' + gameState.score);
                } else {
                    gameState.snake.pop();
                }
                
            } catch (error) {
                debugLog('ERROR during update: ' + error.message);
            }
        }

        function gameLoop() {
            try {
                update();
                draw();
                if (gameState.gameRunning) {
                    setTimeout(gameLoop, 150);
                } else {
                    debugLog('Game ended');
                }
            } catch (error) {
                debugLog('ERROR in game loop: ' + error.message);
            }
        }

        // Keyboard controls
        function handleKeyPress(e) {
            if (!gameState.gameRunning) return;

            const key = e.key.toLowerCase();
            debugLog('Key pressed: ' + key);
            
            switch(key) {
                case 'arrowup':
                case 'w':
                    if (gameState.dy !== 1) {
                        gameState.dx = 0;
                        gameState.dy = -1;
                    }
                    break;
                case 'arrowdown':
                case 's':
                    if (gameState.dy !== -1) {
                        gameState.dx = 0;
                        gameState.dy = 1;
                    }
                    break;
                case 'arrowleft':
                case 'a':
                    if (gameState.dx !== 1) {
                        gameState.dx = -1;
                        gameState.dy = 0;
                    }
                    break;
                case 'arrowright':
                case 'd':
                    if (gameState.dx !== -1) {
                        gameState.dx = 1;
                        gameState.dy = 0;
                    }
                    break;
            }
        }

        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            debugLog('DOM Content Loaded');
            
            setTimeout(function() {
                debugLog('Attempting to initialize game...');
                const success = initGame();
                
                if (success) {
                    debugLog('Adding event listeners...');
                    document.addEventListener('keydown', handleKeyPress);
                    debugLog('Game setup complete!');
                } else {
                    debugLog('Game initialization failed!');
                }
            }, 100);
        });

        // Additional error handling
        window.addEventListener('error', function(e) {
            debugLog('Window error: ' + e.message + ' at ' + e.filename + ':' + e.lineno);
        });
    </script>
</body>
</html>
